{% extends 'base.html' %}
{% block title %}Password Changed — DateMe{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-icon">✅</div>
    <h2 class="auth-title">Password Changed!</h2>
    <p class="auth-sub">Your password has been set successfully. You can now log in with your new password.</p>

    <a href="{% url 'login' %}" class="btn btn-primary btn-full" style="margin-top:1.5rem">
      Log In Now
    </a>

  </div>
</div>
{% endblock %}
